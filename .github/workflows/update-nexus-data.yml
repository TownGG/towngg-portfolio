name: Update Nexus dashboard data

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-nexus-dashboard-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect Nexus stats
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          NEXUS_AUTO_DISCOVER: "true"
          NEXUS_AUTHOR_NAME: "TownGG"
          NEXUS_DISCOVERY_GAME: "starfield"
          NEXUS_DISCOVERY_PERIOD: "1m"
        run: python scripts/collect-nexus.py
      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/nexus-mods.json assets/data/nexus-history.csv assets/data/nexus-latest.json
          if git diff --cached --quiet; then
            echo "No Nexus data changes to commit."
            exit 0
          fi
          git commit -m "Update Nexus dashboard data"
          git pull --rebase origin main
          git push origin HEAD:main
