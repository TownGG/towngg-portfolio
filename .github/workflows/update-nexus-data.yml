name: Update Nexus dashboard data

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect Nexus stats
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: python scripts/collect-nexus.py
      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/nexus-history.csv
          git diff --cached --quiet || git commit -m "Update Nexus dashboard data"
          git push
