name: Sync Bethesda Creations

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 03:30 UTC / 11:30 Beijing time.
    - cron: "30 3 * * *"

permissions:
  contents: write

jobs:
  sync-creations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Sync Bethesda Creations stats and covers
        run: npm run cc:sync

      - name: Commit and push changes
        run: |
          if git diff --quiet -- assets/js/site-data.js; then
            echo "No Creations changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/site-data.js
          git commit -m "Update Creations stats and covers"
          git push
