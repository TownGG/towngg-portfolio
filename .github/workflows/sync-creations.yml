name: Sync Bethesda Creations

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-creations
  cancel-in-progress: false

jobs:
  sync-creations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Bethesda login state
        env:
          BETHESDA_STORAGE_STATE: ${{ secrets.BETHESDA_STORAGE_STATE }}
        run: |
          if [ -n "$BETHESDA_STORAGE_STATE" ]; then
            mkdir -p .auth
            printf '%s' "$BETHESDA_STORAGE_STATE" > .auth/bethesda-storage.json
            echo "Bethesda storage state restored."
          else
            echo "No Bethesda storage state secret found. Public data only."
          fi

      - name: Discover Bethesda Creations list
        run: xvfb-run -a npm run cc:discover:headed

      - name: Sync Bethesda Creations stats and covers
        run: xvfb-run -a npm run cc:sync:headed

      - name: Print captured Creations stats
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const source = fs.readFileSync('assets/js/site-data.js', 'utf8');
          const context = { window: {} };
          vm.createContext(context);
          vm.runInContext(source, context, { filename: 'site-data.js' });
          const creations = Array.isArray(context.window.siteData?.creations) ? context.window.siteData.creations : [];
          const rows = creations.map((item) => ({
            title: item.title || '',
            views: item.views || '-',
            bookmarks: item.bookmarks || '-',
            likes: item.likes || '-',
            downloads: item.downloads || '-',
            plays: item.plays || '-',
            libraryAdds: item.libraryAdds || '-',
            updatedAt: item.updatedAt || '-',
            source: item.source || '-'
          }));
          console.log('Captured Bethesda Creations stats from assets/js/site-data.js:');
          console.table(rows);
          console.log(JSON.stringify(rows, null, 2));
          NODE

      - name: Capture Bethesda debug pages
        if: always()
        continue-on-error: true
        run: node scripts/debug-creations-cloud.js

      - name: Upload Bethesda debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bethesda-creations-debug
          path: artifacts/creations-debug
          if-no-files-found: ignore
          retention-days: 7

      - name: Check Creations data changes
        id: cc_changes
        run: |
          if git diff --quiet -- assets/js/site-data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Creations data changes detected after sync. Timestamp and history will not be updated."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Creations data changed. Timestamp and history will be updated."
          fi

      - name: Stamp Creations sync time and history
        if: steps.cc_changes.outputs.changed == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const siteFile = 'assets/js/site-data.js';
          const historyFile = 'assets/data/creations-history.csv';
          const modDailyFile = 'assets/data/creations-mod-daily.csv';
          const parts = Object.fromEntries(
            new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Shanghai',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false
            }).formatToParts(new Date()).map((part) => [part.type, part.value])
          );
          const stamp = `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}`;
          const date = stamp.slice(0, 10);
          let source = fs.readFileSync(siteFile, 'utf8');
          source = source.replace(/updatedAt: "\d{4}-\d{2}-\d{2}(?: \d{2}:\d{2})?"/g, `updatedAt: "${stamp}"`);
          fs.writeFileSync(siteFile, source);

          const context = { window: {} };
          vm.createContext(context);
          vm.runInContext(source, context, { filename: 'site-data.js' });
          const creations = Array.isArray(context.window.siteData?.creations) ? context.window.siteData.creations : [];
          const number = (value) => Number(String(value || '0').replace(/[^0-9.-]/g, '')) || 0;
          const normalize = (value) => String(value || '').trim().toLowerCase();
          const csvCell = (value) => {
            const text = String(value ?? '');
            return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
          };
          const parseCSV = (text) => {
            const rows = [];
            let cell = '';
            let row = [];
            let quoted = false;
            for (let index = 0; index < text.length; index += 1) {
              const char = text[index];
              const next = text[index + 1];
              if (char === '"' && quoted && next === '"') {
                cell += '"';
                index += 1;
              } else if (char === '"') {
                quoted = !quoted;
              } else if (char === ',' && !quoted) {
                row.push(cell);
                cell = '';
              } else if ((char === '\n' || char === '\r') && !quoted) {
                if (char === '\r' && next === '\n') index += 1;
                row.push(cell);
                if (row.some((item) => item.trim())) rows.push(row);
                row = [];
                cell = '';
              } else {
                cell += char;
              }
            }
            if (cell || row.length) {
              row.push(cell);
              rows.push(row);
            }
            const headers = rows.shift() || [];
            return rows.map((items) => Object.fromEntries(headers.map((header, index) => [header, items[index] || ''])));
          };

          const totals = creations.reduce((sum, item) => {
            sum.downloads += number(item.downloads);
            sum.likes += number(item.likes);
            sum.plays += number(item.plays);
            sum.libraryAdds += number(item.libraryAdds);
            return sum;
          }, { downloads: 0, likes: 0, plays: 0, libraryAdds: 0 });

          const header = 'timestamp,date,total_downloads,total_likes,total_plays,total_library_adds';
          const row = [stamp, date, totals.downloads, totals.likes, totals.plays, totals.libraryAdds].join(',');
          let lines = [];
          if (fs.existsSync(historyFile)) {
            lines = fs.readFileSync(historyFile, 'utf8').split(/\r?\n/).filter(Boolean);
          }
          if (!lines.length || lines[0] !== header) lines = [header, ...lines.filter((line) => !line.startsWith('timestamp,'))];
          lines = lines.filter((line) => !line.startsWith(`${stamp},`));
          lines.push(row);
          const cutoff = new Date(Date.now() - 70 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
          lines = [lines[0], ...lines.slice(1).filter((line) => {
            const dateColumn = line.split(',')[1] || '';
            return dateColumn >= cutoff;
          })];
          fs.writeFileSync(historyFile, `${lines.join('\n')}\n`);

          const modHeader = 'date,title,downloads,daily_downloads,last_updated';
          let modRows = [];
          if (fs.existsSync(modDailyFile)) {
            modRows = parseCSV(fs.readFileSync(modDailyFile, 'utf8'));
          }
          const latestByTitle = new Map();
          modRows.forEach((item) => {
            const key = normalize(item.title);
            if (!key) return;
            const current = latestByTitle.get(key);
            const currentOrder = `${item.date || ''} ${item.last_updated || ''}`;
            const previousOrder = current ? `${current.date || ''} ${current.last_updated || ''}` : '';
            if (!current || currentOrder > previousOrder) latestByTitle.set(key, item);
          });

          const currentKeys = new Set();
          const todayRows = creations.map((item) => {
            const title = String(item.title || '').trim();
            const key = normalize(title);
            const downloads = number(item.downloads);
            const previous = latestByTitle.get(key);
            const previousDownloads = previous ? number(previous.downloads) : downloads;
            const previousDaily = previous && previous.date === date ? number(previous.daily_downloads) : 0;
            const daily = previousDaily + Math.max(0, downloads - previousDownloads);
            currentKeys.add(`${date}::${key}`);
            return { date, title, downloads, daily_downloads: daily, last_updated: stamp };
          });

          const keptModRows = modRows.filter((item) => {
            const key = `${item.date || ''}::${normalize(item.title)}`;
            return item.date >= cutoff && !currentKeys.has(key);
          });
          const modLines = [modHeader, ...keptModRows.concat(todayRows).map((item) => [
            item.date,
            csvCell(item.title),
            number(item.downloads),
            number(item.daily_downloads),
            item.last_updated || stamp
          ].join(','))];
          fs.writeFileSync(modDailyFile, `${modLines.join('\n')}\n`);

          console.log(`Creations sync timestamp stamped: ${stamp}`);
          console.log(`Creations history snapshot recorded: ${row}`);
          console.log(`Creations per-mod daily downloads updated: ${todayRows.length} rows.`);
          NODE

      - name: Commit and push changes
        run: |
          if git diff --quiet -- assets/js/site-data.js assets/data/creations-history.csv assets/data/creations-mod-daily.csv; then
            echo "No Creations changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/site-data.js assets/data/creations-history.csv assets/data/creations-mod-daily.csv
          git commit -m "Update Creations stats and covers"
          git pull --rebase origin main
          git push
